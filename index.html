<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Comissão André</title>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Rajdhani:wght@400;600&display=swap" rel="stylesheet">

<style>
*{margin:0;padding:0;box-sizing:border-box}
body{
  font-family:'Rajdhani',sans-serif;
  background:radial-gradient(circle at top,#020617,#000);
  color:#fff;
}

.wrapper{
  padding:20px;
  max-width:1400px;
  margin:auto;
}

.header{
  display:flex;
  justify-content:space-between;
  align-items:center;
  margin-bottom:20px;
}

.title{
  font-family:'Orbitron';
  font-size:38px;
}

.title span{color:#00eaff}

.grid{
  display:grid;
  grid-template-columns:350px 1fr;
  gap:20px;
}

.card{
  background:#020617;
  border:1px solid #00eaff33;
  border-radius:15px;
  padding:20px;
  box-shadow:0 0 25px #00eaff22;
}

.avatar{
  text-align:center;
}

.avatar img{
  width:100%;
  border-radius:20px;
  box-shadow:0 0 30px #00eaff55;
}

input,select{
  width:100%;
  padding:12px;
  margin-top:10px;
  background:#000;
  border:1px solid #00eaff33;
  color:#fff;
  border-radius:10px;
}

.buttons{
  display:flex;
  gap:10px;
  margin-top:10px;
}

.buttons div{
  flex:1;
  padding:12px;
  text-align:center;
  border:1px solid #00eaff55;
  border-radius:10px;
  cursor:pointer;
}

.active{background:#00eaff;color:#000}

button{
  width:100%;
  margin-top:15px;
  padding:15px;
  border:none;
  border-radius:12px;
  background:#00eaff;
  color:#000;
  font-weight:bold;
  cursor:pointer;
}

.stats{
  display:grid;
  grid-template-columns:repeat(4,1fr);
  gap:15px;
  margin-top:20px;
}

.stat{
  padding:15px;
  background:#000;
  border:1px solid #00eaff22;
  border-radius:10px;
  text-align:center;
}

.table{
  width:100%;
  margin-top:20px;
  border-collapse:collapse;
}

.table th,.table td{
  padding:10px;
  border-bottom:1px solid #00eaff22;
}

.table th{color:#00eaff}

</style>
</head>

<body>
<div class="wrapper">

<div class="header">
  <div class="title">COMISSÃO <span>ANDRÉ</span></div>
  <div>Analista de Sistemas</div>
</div>

<div class="grid">

<div class="card avatar">
  <img src="assets/Andre.jpg">
</div>

<div>

<div class="card">
<h3>Novo Cálculo</h3>

<input id="cliente" placeholder="Cliente">
<input id="valor" type="number" placeholder="Valor">

<div class="buttons">
  <div onclick="setTipo(5)" id="b1">Venda 5%</div>
  <div onclick="setTipo(25)" id="b2">Lead 25%</div>
  <div onclick="setTipo(100)" id="b3">100%</div>
</div>

<button onclick="add()">ADICIONAR +</button>

</div>

<div class="stats">
  <div class="stat"><h4>Clientes</h4><p id="qtd">0</p></div>
  <div class="stat"><h4>Total</h4><p id="total">R$ 0</p></div>
  <div class="stat"><h4>Média</h4><p id="media">R$ 0</p></div>
  <div class="stat"><h4>Maior</h4><p id="maior">R$ 0</p></div>
</div>

<table class="table">
<thead>
<tr>
<th>#</th>
<th>Cliente</th>
<th>%</th>
<th>Valor</th>
<th>Recebimento</th>
</tr>
</thead>
<tbody id="tb"></tbody>
</table>

</div>

</div>

</div>

<script>
let tipo=5;
let total=0;
let qtd=0;
let maior=0;

function setTipo(t){
  tipo=t;
  document.querySelectorAll('.buttons div').forEach(e=>e.classList.remove('active'));
  if(t==5)document.getElementById('b1').classList.add('active');
  if(t==25)document.getElementById('b2').classList.add('active');
  if(t==100)document.getElementById('b3').classList.add('active');
}

function add(){
  let cliente=document.getElementById('cliente').value;
  let valor=parseFloat(document.getElementById('valor').value);
  if(!cliente||!valor)return alert('Preencha');

  let rec=valor*tipo/100;

  total+=rec;
  qtd++;
  if(rec>maior)maior=rec;

  document.getElementById('tb').innerHTML+=`
  <tr>
  <td>${qtd}</td>
  <td>${cliente}</td>
  <td>${tipo}%</td>
  <td>R$ ${valor.toFixed(2)}</td>
  <td>R$ ${rec.toFixed(2)}</td>
  </tr>`;

  document.getElementById('total').innerText='R$ '+total.toFixed(2);
  document.getElementById('qtd').innerText=qtd;
  document.getElementById('media').innerText='R$ '+(total/qtd).toFixed(2);
  document.getElementById('maior').innerText='R$ '+maior.toFixed(2);

  document.getElementById('cliente').value='';
  document.getElementById('valor').value='';
}
</script>

</body>
</html>
